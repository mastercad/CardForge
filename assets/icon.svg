<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>CardForge</title>
  <defs>
    <!-- Shadow for the back card (larger region because of rotation) -->
    <filter id="shd-back" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="6" dy="14" stdDeviation="12"
                    flood-color="#0f172a" flood-opacity="0.45"/>
    </filter>
    <!-- Shadow for the front card -->
    <filter id="shd-front" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="22"
                    flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <!-- Clip path = front card outline (for rounded header) -->
    <clipPath id="clip-front">
      <rect x="76" y="151" width="360" height="210" rx="18"/>
    </clipPath>
  </defs>

  <!-- ── Back card (dark slate, rotated 12° CW around canvas centre) ── -->
  <rect x="76" y="151" width="360" height="210" rx="18"
        fill="#334155"
        transform="rotate(12 256 256)"
        filter="url(#shd-back)"/>

  <!-- ── Front card (white) ── -->
  <rect x="76" y="151" width="360" height="210" rx="18"
        fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"
        filter="url(#shd-front)"/>

  <!-- Header bar (dark navy) — clipped so top corners stay rounded -->
  <rect x="76" y="151" width="360" height="65" fill="#0f172a"
        clip-path="url(#clip-front)"/>

  <!-- Blue accent stripe at the bottom of the header -->
  <rect x="76" y="213" width="360" height="3" fill="#3b82f6"
        clip-path="url(#clip-front)"/>

  <!-- ── Content lines ── -->
  <!-- Name -->
  <rect x="112" y="237" width="172" height="13" rx="6.5" fill="#1e293b"/>
  <!-- Title / Role -->
  <rect x="112" y="262" width="112" height="9"  rx="4.5" fill="#64748b"/>
  <!-- Thin divider -->
  <rect x="112" y="283" width="248" height="1.5" rx="0.75" fill="#cbd5e1"/>
  <!-- Contact line 1 -->
  <rect x="112" y="293" width="156" height="8"  rx="4"   fill="#94a3b8"/>
  <!-- Contact line 2 -->
  <rect x="112" y="310" width="122" height="8"  rx="4"   fill="#94a3b8"/>
  <!-- Contact line 3 -->
  <rect x="112" y="327" width="140" height="8"  rx="4"   fill="#94a3b8"/>

  <!-- ── Forge spark diamond (amber) — centred in header right area ── -->
  <!--   Centre: x=390, y=183 (48 px from right card edge, header midline) -->
  <!-- Outer glow -->
  <polygon points="390,161 412,183 390,205 368,183"
           fill="#fbbf24" opacity="0.18"/>
  <!-- Main diamond -->
  <polygon points="390,168 406,184 390,200 374,184" fill="#f59e0b"/>
  <!-- Inner facet -->
  <polygon points="390,175 398,183 390,191 382,183" fill="#fde68a"/>
  <!-- Tiny shine -->
  <circle cx="388" cy="181" r="2.5" fill="white" opacity="0.75"/>
</svg>
